services:
  postgres-dse-lab-2:
    image: postgres:18-alpine
    container_name: postgres-dse-lab-2
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: dse 
    ports:
      - "5432:5432"
    volumes:
      - ./hospital.sql:/docker-entrypoint-initdb.d/init.sql
